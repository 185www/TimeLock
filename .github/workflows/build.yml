name: Build APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.5"
          cache-read-only: false

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon > build_output.txt 2>&1 || true

      - name: Report build output
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let out = '';
            try { out = fs.readFileSync('build_output.txt', 'utf8'); } catch (e) { out = 'NO OUTPUT FILE'; }
            const max = 6000;
            out = out.length > max ? out.slice(out.length - max) : out;
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: '### Build log (tail)\n```\n' + out + '\n```'
            });

      - name: Upload APK as Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TimeLock-APK
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error

      - name: Sign APK
        if: success() && startsWith(github.ref, 'refs/tags/v')
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload to Release
        if: success() && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
