name: Build APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.5"
          cache-read-only: false

      - name: Build Debug APK (installable)
        run: gradle assembleDebug --no-daemon > build_output.txt 2>&1 || true

      - name: Report build output
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let out = '';
            try { out = fs.readFileSync('build_output.txt', 'utf8'); } catch (e) { out = 'NO OUTPUT FILE'; }
            const max = 6000;
            out = out.length > max ? out.slice(out.length - max) : out;
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: '### Build log (tail)\n```\n' + out + '\n```'
            });

      - name: Upload APK as Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TimeLock-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
